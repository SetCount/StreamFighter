name: Wails build

on:
  push:
    tags:
    # Match version tags only, e.g. v1.2.3
      - 'v*'

env:
  # Necessary for most environments as build failure can occur due to OOM issues
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
    # Failure in one platform build won't impact the others
      fail-fast: false
      matrix:
        build:
          - name: 'StreamFighter'
            platform:  'linux/amd64'
            os: 'ubuntu-22.04'
            bin: 'StreamFighter'
          - name: 'StreamFighter'
            platform:  'windows/amd64'
            os: 'windows-latest'
            bin: 'StreamFighter.exe'
          # - name: 'StreamFighter'
          #   platform:  'darwin/universal'
          #   os: 'macos-latest'
          #   bin: 'StreamFighter'

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform ${{ matrix.build.platform }} -ldflags "-X 'StreamFighter/internal.Version=${{ github.ref_name }}'"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.name }}-${{ runner.os }}
          path: build/bin/${{ matrix.build.bin }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
